<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendSmart - Expense Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #0f0f1a;
      color: #e0e0f0;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #c0c0e0;
      margin-bottom: 6px;
    }

    .tagline {
      text-align: center;
      font-size: 0.8rem;
      color: #555577;
      letter-spacing: 2px;
      margin-bottom: 36px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .summary-label {
      font-size: 0.7rem;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 1.6rem;
      font-weight: 300;
    }

    .income-val { color: #4ecca3; }
    .expense-val { color: #e94560; }
    .balance-val { color: #a0a0ff; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
    }

    .card-title {
      font-size: 0.75rem;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e0e0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input::placeholder { color: #555577; }
    .form-group input:focus,
    .form-group select:focus { border-color: rgba(255,255,255,0.3); }

    .form-group select option { background: #1a1a2e; }

    .type-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #8888aa;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .type-btn.active-income {
      background: rgba(78, 204, 163, 0.15);
      border-color: #4ecca3;
      color: #4ecca3;
    }

    .type-btn.active-expense {
      background: rgba(233, 69, 96, 0.15);
      border-color: #e94560;
      color: #e94560;
    }

    .add-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .add-btn:hover { background: #c73652; }
    .add-btn:active { transform: scale(0.98); }

    .chart-container {
      position: relative;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      gap: 8px;
      padding: 0 4px;
    }

    .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 6px;
    }

    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      transition: height 0.4s ease;
      min-height: 4px;
    }

    .bar-label {
      font-size: 0.65rem;
      color: #8888aa;
      text-align: center;
    }

    .bar-amount {
      font-size: 0.65rem;
      color: #aaaacc;
    }

    .transactions-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
    }

    .transactions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .filter-select {
      padding: 7px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 0.8rem;
      outline: none;
    }

    .filter-select option { background: #1a1a2e; }

    .transaction-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .transaction-item:last-child { border-bottom: none; }

    .tx-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tx-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .tx-icon.income { background: rgba(78, 204, 163, 0.15); }
    .tx-icon.expense { background: rgba(233, 69, 96, 0.15); }

    .tx-name {
      font-size: 0.95rem;
      color: #e0e0f0;
    }

    .tx-meta {
      font-size: 0.75rem;
      color: #555577;
      margin-top: 2px;
    }

    .tx-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .tx-amount {
      font-size: 1rem;
      font-weight: 500;
    }

    .tx-amount.income { color: #4ecca3; }
    .tx-amount.expense { color: #e94560; }

    .tx-delete {
      background: none;
      border: none;
      color: #444466;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .tx-delete:hover { color: #e94560; }

    .empty-state {
      text-align: center;
      color: #555577;
      font-size: 0.9rem;
      padding: 30px 0;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.75rem;
      color: #333355;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .main-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>SpendSmart</h1>
  <p class="tagline">Track your income & expenses</p>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">Total Income</div>
      <div class="summary-value income-val" id="totalIncome">₹0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total Expenses</div>
      <div class="summary-value expense-val" id="totalExpense">₹0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Balance</div>
      <div class="summary-value balance-val" id="balance">₹0</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div class="card-title">Add Transaction</div>

      <div class="type-toggle">
        <button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">Expense</button>
        <button class="type-btn" id="btnIncome" onclick="setType('income')">Income</button>
      </div>

      <div class="form-group">
        <input type="text" id="txName" placeholder="Description (e.g. Groceries)" />
      </div>
      <div class="form-group">
        <input type="number" id="txAmount" placeholder="Amount (₹)" min="0" />
      </div>
      <div class="form-group">
        <select id="txCategory">
          <option value="">Select category</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Salary">💼 Salary</option>
          <option value="Freelance">💻 Freelance</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <input type="date" id="txDate" />
      </div>

      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <div class="card">
      <div class="card-title">Spending by Category</div>
      <div class="chart-container" id="chartContainer">
        <div class="empty-state">No data yet</div>
      </div>
    </div>
  </div>

  <div class="transactions-card">
    <div class="transactions-header">
      <div class="card-title" style="margin:0">Recent Transactions</div>
      <select class="filter-select" id="filterSelect" onchange="renderTransactions()">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>
    <div id="transactionsList"></div>
  </div>

  <footer>SpendSmart &mdash; Personal Finance Tracker</footer>
</div>

<script>
  let transactions = JSON.parse(localStorage.getItem('spendsmart_txns') || '[]');
  let currentType = 'expense';

  const categoryIcons = {
    Food: '🍔', Transport: '🚗', Shopping: '🛍️', Entertainment: '🎮',
    Health: '💊', Education: '📚', Salary: '💼', Freelance: '💻', Other: '📦'
  };

  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];

  function setType(type) {
    currentType = type;
    document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
    document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  }

  function save() {
    localStorage.setItem('spendsmart_txns', JSON.stringify(transactions));
  }

  function formatAmount(n) {
    return '₹' + Number(n).toLocaleString('en-IN');
  }

  function addTransaction() {
    const name = document.getElementById('txName').value.trim();
    const amount = parseFloat(document.getElementById('txAmount').value);
    const category = document.getElementById('txCategory').value;
    const date = document.getElementById('txDate').value;

    if (!name || isNaN(amount) || amount <= 0 || !category || !date) {
      alert('Please fill all fields correctly.');
      return;
    }

    transactions.unshift({ id: Date.now(), name, amount, category, date, type: currentType });
    save();

    document.getElementById('txName').value = '';
    document.getElementById('txAmount').value = '';
    document.getElementById('txCategory').value = '';
    document.getElementById('txDate').value = new Date().toISOString().split('T')[0];

    render();
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  function updateSummary() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent = formatAmount(income);
    document.getElementById('totalExpense').textContent = formatAmount(expense);
    const balEl = document.getElementById('balance');
    balEl.textContent = formatAmount(Math.abs(balance));
    balEl.style.color = balance >= 0 ? '#4ecca3' : '#e94560';
  }

  function renderChart() {
    const container = document.getElementById('chartContainer');
    const expenses = transactions.filter(t => t.type === 'expense');

    if (expenses.length === 0) {
      container.innerHTML = '<div class="empty-state">No expense data yet</div>';
      return;
    }

    const catTotals = {};
    expenses.forEach(t => {
      catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
    });

    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const max = Math.max(...sorted.map(e => e[1]));

    const colors = ['#e94560', '#a0a0ff', '#4ecca3', '#ffaa44', '#ff6688', '#44bbff'];

    container.innerHTML = sorted.map(([cat, amt], i) => {
      const pct = Math.round((amt / max) * 180);
      return `
        <div class="bar-wrap">
          <div class="bar-amount">${formatAmount(amt)}</div>
          <div class="bar" style="height:${pct}px; background:${colors[i % colors.length]};"></div>
          <div class="bar-label">${cat}</div>
        </div>
      `;
    }).join('');
  }

  function renderTransactions() {
    const filter = document.getElementById('filterSelect').value;
    const list = document.getElementById('transactionsList');
    const filtered = filter === 'all' ? transactions : transactions.filter(t => t.type === filter);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No transactions found</div>';
      return;
    }

    list.innerHTML = filtered.slice(0, 20).map(t => `
      <div class="transaction-item">
        <div class="tx-left">
          <div class="tx-icon ${t.type}">${categoryIcons[t.category] || '📦'}</div>
          <div>
            <div class="tx-name">${t.name}</div>
            <div class="tx-meta">${t.category} &middot; ${new Date(t.date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</div>
          </div>
        </div>
        <div class="tx-right">
          <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${formatAmount(t.amount)}</div>
          <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  function render() {
    updateSummary();
    renderChart();
    renderTransactions();
  }

  render();
</script>
</body>
</html>
